name: Build Edition & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'content/**.md'        # New/edited edition content
      - 'templates/**.j2'      # Template changes → rebuild all
      - 'build_edition.py'     # Script changes → rebuild all
      - 'build_all.py'
  workflow_dispatch:           # Manual trigger (full rebuild)
    inputs:
      rebuild_all:
        description: 'Force rebuild of all editions'
        required: false
        default: 'false'

permissions:
  contents: write              # Needed to commit generated HTML back

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2         # Needed to detect changed files

      # ── 2. Python setup ────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Detect what changed ──────────────────────────────
      - name: Detect changed content files
        id: changed
        run: |
          # Full rebuild conditions
          REBUILD_ALL="${{ github.event.inputs.rebuild_all }}"
          TEMPLATE_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^templates/|^build_edition\.py|^build_all\.py' || true)

          if [ "$REBUILD_ALL" = "true" ] || [ -n "$TEMPLATE_CHANGED" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=all" >> $GITHUB_OUTPUT
            echo "Rebuild mode: ALL"
          else
            # Only changed .md files
            CHANGED_MD=$(git diff --name-only HEAD~1 HEAD | grep '^content/.*\.md$' || true)
            echo "mode=incremental" >> $GITHUB_OUTPUT
            echo "changed_files<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED_MD" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "Rebuild mode: INCREMENTAL — $CHANGED_MD"
          fi

      # ── 4a. Full rebuild ────────────────────────────────────
      - name: Build all editions
        if: steps.changed.outputs.mode == 'all'
        run: |
          python3 build_all.py \
            --content-dir content \
            --output-dir editions \
            --template-dir templates \
            --index index.html
          echo "✓ Full rebuild complete"

      # ── 4b. Incremental build ───────────────────────────────
      - name: Build changed editions
        if: steps.changed.outputs.mode == 'incremental'
        run: |
          FILES="${{ steps.changed.outputs.changed_files }}"
          if [ -z "$FILES" ]; then
            echo "No .md files changed — nothing to build"
            exit 0
          fi
          for f in $FILES; do
            echo "Building: $f"
            python3 build_edition.py "$f" editions templates index.html
          done
          echo "✓ Incremental build complete"

      # ── 5. Commit generated files back ──────────────────────
      - name: Commit generated HTML
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add editions/*.html index.html

          if git diff --staged --quiet; then
            echo "Nothing to commit — HTML is up to date"
          else
            # Extract edition date from commit message context
            EDITION=$(git diff --staged --name-only | grep 'editions/' | head -1 | sed 's|editions/||;s|\.html||')
            git commit -m "build: generate HTML for ${EDITION:-all editions} [skip ci]"
            git push
            echo "✓ Committed and pushed generated HTML"
          fi

      # ── 6. Deploy to GitHub Pages ───────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./              # Serve from repo root
          publish_branch: gh-pages
          exclude_assets: '.github,content,templates,build_edition.py,build_all.py,requirements.txt,*.md'
          commit_message: 'deploy: ${{ github.event.head_commit.message }}'
